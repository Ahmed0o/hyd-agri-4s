<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4سبان ورقيات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --gd:#0F3D22;--gm:#1A5C38;--gp:#EAF5EF;--gb:#B8DFC8;
  --bd:#0C3B6B;--bm:#185FA5;--bp:#E6F1FB;--bb:#A8C9EC;
  --ad:#5C2E00;--am:#A85700;--ap:#FFF0D6;--ab:#F0C87A;
  --bg:#F4F7F4;--sur:#FFFFFF;--sur2:#F0F4F1;
  --bor:#D8E5DC;--tx:#0F1F14;--tx2:#4A6355;--tx3:#7A9A88;
  --sh:0 1px 3px rgba(15,62,34,.08),0 4px 16px rgba(15,62,34,.06);
  --sh2:0 1px 2px rgba(15,62,34,.06);--r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:36px 32px;width:100%;max-width:340px;box-shadow:var(--sh);text-align:center}
.login-logo{font-size:44px;margin-bottom:8px}
.login-title{font-size:20px;font-weight:700;color:var(--tx);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--tx3);margin-bottom:24px}
.login-input{width:100%;padding:11px 14px;border-radius:var(--r2);border:1.5px solid var(--bor);background:var(--sur);color:var(--tx);font-size:16px;font-family:'Cairo',sans-serif;text-align:center;letter-spacing:4px;margin-bottom:14px}
.login-input:focus{outline:none;border-color:var(--gm)}
.login-btn{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--gm),var(--gd));color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(26,92,56,.35);transition:opacity 0.2s}
.login-btn:disabled{opacity:0.7;cursor:wait}
.login-error{font-size:12px;color:#C62828;margin-top:10px;display:none}

/* TOPBAR */
.topbar{background:var(--gd);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.topbar-logo{display:flex;align-items:center;gap:10px;color:#fff;font-size:16px;font-weight:700}
.sync-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:12px;color:rgba(255,255,255,.85);cursor:pointer}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#8BC34A;transition:background .3s}
.sync-dot.loading{background:#FFB300;animation:blink .8s infinite}
.sync-dot.error{background:#EF5350}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* LAYOUT */
.container{max-width:680px;margin:0 auto;padding:20px 16px 60px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--sh2)}
.stat-card .n{font-size:28px;font-weight:700;color:var(--gm);line-height:1}
.stat-card .l{font-size:12px;color:var(--tx2);margin-top:4px}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:5px;margin-bottom:16px;box-shadow:var(--sh2)}
.tab{flex:1;padding:9px 6px;border-radius:var(--r2);border:none;background:transparent;font-family:'Cairo',sans-serif;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.on{background:var(--gd);color:#fff;box-shadow:0 2px 8px rgba(15,62,34,.25)}
.tab svg{width:15px;height:15px}
.pg{display:none}.pg.on{display:block}

/* CARD */
.card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}
.card-title{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:8px}

/* OP SELECTOR */
.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.op-btn{padding:16px 8px 12px;border-radius:var(--r);border:2px solid var(--bor);background:var(--sur2);cursor:pointer;text-align:center;transition:all .18s;font-family:'Cairo',sans-serif}
.op-icon{font-size:26px;display:block;margin-bottom:6px}
.op-lbl{font-size:14px;font-weight:700;color:var(--tx);display:block}
.op-sub{font-size:10px;color:var(--tx3);margin-top:2px;display:block}
.op-btn.sel-z{border-color:var(--gm);background:var(--gp)}.op-btn.sel-z .op-lbl{color:var(--gd)}
